version: "3.9"

x-lethe-base: &lethe-base
  image: lethe:dev
  build:
    # compose v2 resolves `context` relative to THIS file's directory
    # (deploy/), so the build context is the repo root one level up.
    # dockerfile is then relative to that context.
    context: ..
    dockerfile: deploy/Dockerfile
  cap_add:
    - NET_ADMIN              # for chaos.partition / packet_loss
  networks:
    - lethe-net

services:
  # NOTE: the ENTRYPOINT is already /usr/local/bin/lethe_server, so the
  # `command` is ARGS ONLY — do NOT repeat ./lethe_server (the W0 file
  # did, which made argv[1]=node_id="./lethe_server" and the port parse
  # crash). Peers use main.cpp's --peers node@host:port,... format. Each
  # container binds metrics on 9090 in its own netns (mapped to host
  # 9091/2/3); prometheus.yml scrapes nodeN:9090 inside the lethe-net.
  lethe-node0:
    <<: *lethe-base
    container_name: lethe-node0
    command: ["node0", "50051",
              "--peers", "node1@lethe-node1:50051,node2@lethe-node2:50051"]
    ports:
      - "50051:50051"
      - "9091:9090"

  lethe-node1:
    <<: *lethe-base
    container_name: lethe-node1
    command: ["node1", "50051",
              "--peers", "node0@lethe-node0:50051,node2@lethe-node2:50051"]
    ports:
      - "50061:50051"
      - "9092:9090"

  lethe-node2:
    <<: *lethe-base
    container_name: lethe-node2
    command: ["node2", "50051",
              "--peers", "node0@lethe-node0:50051,node1@lethe-node1:50051"]
    ports:
      - "50071:50051"
      - "9093:9090"

  prometheus:
    image: prom/prometheus:latest
    container_name: lethe-prometheus
    volumes:
      # paths are relative to THIS file's dir (deploy/), not the repo root.
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - lethe-net

  grafana:
    image: grafana/grafana:latest
    container_name: lethe-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - lethe-net

networks:
  lethe-net:
    driver: bridge
